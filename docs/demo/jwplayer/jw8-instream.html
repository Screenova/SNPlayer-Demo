<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="favicon" rel="shortcut icon" href="https://screenova.cloud/logo.png" type="image/png"
    class="badge-init" data-href="https://screenova.cloud/logo.png">
  <title>JW8 Test page</title>
  <script src='./lib/jw-8.24.3/jwplayer.js'></script>
  <style>
    body {
      color: #c6fff4;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #212122;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    h1 {
      width: 80%;
    }

    #video-container {
      position: relative;
      text-align: center;
      width: 800px;
      height: 450px;
    }

    .container {
      width: 800px;
    }

    #msg {
      padding-bottom: 16px;
      text-align: left;
      line-height: 24px;
    }

    #player {
      width: 100%;
      height: 100%;
      display: block;
      background-color: black;
    }

    .settings {
      padding: 10px;
      margin-bottom: 40px;
      width: 100%;
    }

    .settings-section {
      padding: 10px;
      width: 100%;
    }

    .button {
      height: 50px;
      color: gray;
      background-color: #8ea2af;
      border: 1px solid gray;
      display: inline-block;
      padding: 0px 16px;
      margin: 5px;
      cursor: pointer;
      font-size: large;
      font-weight: bold;
      text-align: center;
      line-height: 50px;
    }


    .button.selected {
      color: white;
      background-color: #5a95a2;
      border: 1px solid white;
    }

    #snp-version {
      color: white;
    }
  </style>
  <link rel="stylesheet" href="../../screenova-theme.css">
  <script defer src="../../screenova-theme.js"></script>
</head>

<body>
  <div class="container">
    <h1 id="title">Screenova JW Plugin</h1>
    <div class="settings">
      <div class="settings-section">
        SNPlayer version : <span id="version"></span>
      </div>
      <div class="settings-section">
        <div class="button" id="preroll">Preroll</div>
        <div class="button" id="midroll">Midroll</div>
        <div class="button" id="postroll">Postroll</div>
        <div class="button" id="nonlinear">Non Linear</div>
        <div class="button" id="onpause">On Pause</div>
      </div>
      <div class="settings-section">
        <label for="mediatype">Nonlinear ad Mediatype: </label>
        <select id="mediatype">
          <option value="video">Video</option>
          <option value="videonative">Video with native</option>
          <!-- <option value="native">Native</option>
          <option value="carousel">Carousel</option>
          <option value="banner">Banner</option> -->
        </select>
      </div>
      <button onclick="changeTest()" style="width: 80px; height: 40px; border-radius: 16px;">APPLY ></button>
      <script>
        // JavaScript pour gérer les états des boutons
        const buttons = document.querySelectorAll('.button');

        buttons.forEach(button => {
          button.addEventListener('click', () => {
            button.classList.toggle('selected');
          });
        });
      </script>
    </div>
  </div>
  <div id="video-container">
    <div id="msg"></div>
    <div id="player">

    </div>
  </div>

  <script type="text/javascript">

    function addMessage(str) {
      const el = document.getElementById("msg");
      let newLine = "<br/>";
      if (!el.innerText.length) {
        newLine = "";
      }
      el.innerHTML = el.innerHTML + newLine + str;
    }

    function findGetParameter(parameterName) {
      var result = null,
        tmp = [];
      location.search
        .substr(1)
        .split("&")
        .forEach(function (item) {
          tmp = item.split("=");
          if (tmp[0].toLowerCase() === parameterName.toLowerCase()) result = decodeURIComponent(tmp[1]);
        });
      return result;
    }


    function changeTest() {
      var currentUrl = document.location.href;
      var indexOfQueryStr = currentUrl.lastIndexOf('?');
      if (indexOfQueryStr !== -1) {
        currentUrl = currentUrl.substr(0, indexOfQueryStr);
      }

      var enablePreroll = document.getElementById("preroll").classList.contains('selected');
      var enableMidroll = document.getElementById("midroll").classList.contains('selected');
      var enablePostroll = document.getElementById("postroll").classList.contains('selected');
      var enablePauseAd = document.getElementById("onpause").classList.contains('selected');
      var enableNonLinearAd = document.getElementById("nonlinear").classList.contains('selected');

      var mediatype = document.getElementById("mediatype").value;

      document.location.href = currentUrl + "?snp_debug=false"
        + "&preroll=" + enablePreroll
        + "&midroll=" + enableMidroll
        + "&postroll=" + enablePostroll
        + "&onpause=" + enablePauseAd
        + "&nonlinear=" + enableNonLinearAd
        + "&mediatype=" + mediatype

    }

    var enablePreroll = findGetParameter("preroll") === 'true';
    const funcPre = enablePreroll ? "add" : "remove";
    document.getElementById("preroll").classList[funcPre]('selected');

    var enableMidroll = findGetParameter("midroll") === 'true';
    const funcMid = enableMidroll ? "add" : "remove";
    document.getElementById("midroll").classList[funcMid]('selected');

    var enablePostroll = findGetParameter("postroll") === 'true';
    const funcPost = enablePostroll ? "add" : "remove";
    document.getElementById("postroll").classList[funcPost]('selected');

    var enablePauseAd = findGetParameter("onpause") === 'true';
    const funcPause = enablePauseAd ? "add" : "remove";
    document.getElementById("onpause").classList[funcPause]('selected');

    var enableNonLinearAd = findGetParameter("nonlinear") === 'true';
    const funcNonLinear = enableNonLinearAd ? "add" : "remove";
    document.getElementById("nonlinear").classList[funcNonLinear]('selected');

    var mediatype = findGetParameter("mediatype") || "video";
    document.getElementById("mediatype").value = mediatype;





    // document.getElementById("snp-version").innerText = SN.version;

    const nativeTemplateNativeOnly = '<div class="sn-expand" style="overflow:hidden;width:100%;color:#434748;height:100%;max-height:68px;transition:max-height .7s ease;display:flex;flex-direction:column;justify-content:flex-start;background:#fff;box-shadow:rgba(0,0,0,.7) 0 0 20px;border-radius:8px"><div style="display:flex;flex-direction:row;height:68px"><img class="sn-hideonexpand sn-el-img" style="opacity:1;transition:opacity 0.7s ease;width:0px;height:68px;object-fit:contain" src="../../images/Smartphone-Samsung-Galaxy-Z-Flip4-6-7-Nano-SIM-5G-128-Go-Or-Rose.jpg"><div style="display:flex;flex-direction:column;align-items:center;height:100%;flex-grow:1;justify-content:center"><img class="sn-el-brandlogo" src="" style="width:140px;height:30px;object-fit:cover"><div style="width:100%;height:30px;display:flex;flex-direction:row;justify-content:space-between;align-items:center"><div class="sn-el-title" style="height:16px;flex-grow:1;font-size:14px;">Galaxy Z Flip 5G</div><div class="sn-el-price" style="height:16px;font-weight:600;font-size:14px">999 €</div></div></div><div style="height:calc(100% - 16px);padding:8px 4px;display:flex;flex-direction:column;align-items:center;justify-content:space-around"><img class="sn-el-cartlogo" src="" style="padding:0 4px 0 0;width:48px;padding:4px;height:48px"></div></div><div style="display:flex;flex-direction:row;flew-grow:1;align-items:center;padding-left:10px;margin-top:14px;"><img class="sn-el-img" style="width:50%;object-fit:contain;" src="../../images/Smartphone-Samsung-Galaxy-Z-Flip4-6-7-Nano-SIM-5G-128-Go-Or-Rose.jpg"> <img style="width:50%;height:calc(100% - 30px);object-fit:contain" class="sn-el-qrcode" src=""></div></div>';

    const nativeTemplateCarousel = '<div style="overflow:hidden;width:100%;color:#434748;height:100%;display:flex;flex-direction:column;justify-content:flex-start;background:#fff;"><div style="display:flex;flex-direction:row;height:68px"><img class="sn-el-img" style="opacity:1;transition:opacity 0.7s ease;width:68px;height:68px;object-fit:contain" src="../../images/Smartphone-Samsung-Galaxy-Z-Flip4-6-7-Nano-SIM-5G-128-Go-Or-Rose.jpg"><div style="display:flex;flex-direction:column;align-items:center;height:100%;flex-grow:1;justify-content:center"><img class="sn-el-brandlogo" src="" style="width:140px;height:30px;object-fit:cover"><div style="width:100%;height:30px;display:flex;flex-direction:row;justify-content:space-between;align-items:center"><div class="sn-el-title" style="height:16px;flex-grow:1;font-size:14px;">Galaxy Z Flip 5G</div><div class="sn-el-price" style="height:16px;font-weight:600;font-size:14px">999 €</div></div></div><div style="height:calc(100% - 16px);padding:8px 4px;display:flex;flex-direction:column;align-items:center;justify-content:space-around"><div class="sn-el-closebutton" style="padding: 0px 8px; font-size: 20px; background: rgba(0, 0, 0, 0); border-radius: 0px 10px 10px 0px; transition: all 0.3s ease 0s; display: flex; flex-direction: column; justify-content: center; opacity: 1;"><span style="align-items: center; display: flex; height: 20px; justify-content: center; width: 20px;">×</span></div></div></div></div>';


    const bannerADM = '<!DOCTYPE html><html><head><title>LightInTheBox</title></head><body style="margin:0"><img src="../../resources/banner/banner_300_250_lightinthebox.webp" style="width:300px;height:250px;object-fit:cover" alt="bannière light in the box"></body></html>';
    const bannerADM2 = '<!DOCTYPE html><html><head><title>kingjouet</title></head><body style="margin:0"><img src="../../resources/banner/banner_320_100_kingjouet.png" style="width:320px;height:100px;object-fit:cover" alt="bannière king jouet"></body></html>';


    const ScreenovaConfig = {
      videoElement: document.getElementById("video-target"),
      positionSelector: "#video-container",
      partnerId: "349693",
      hideButtons: false,
    }


    if (enablePreroll) {
      ScreenovaConfig.preroll = {
        placement: "6a3a43656ad3c657d3f8cc33",
      }
      addMessage("Preroll is shown before the content.");
    }
    if (enableMidroll) {
      ScreenovaConfig.midroll = [
        {
          startTime: "00:00:10",
          startInterval: "00:01:00",
          placement: "6a3a43656ad3c657d3f8cc33",
          skipMiniature: true,
          skipMessage: 'Retour au contenu',
        },
        {
          startTime: "50%",
          placement: "6a3a43656ad3c657d3f8cc33",
        },
        {
          startTime: "-00:00:30",
          placement: "6a3a43656ad3c657d3f8cc33",
        }];

      addMessage("Several Midroll shown at : 10s,  50% and 30sec before the end of the content.");
    }
    if (enablePostroll) {
      ScreenovaConfig.postroll = {
        placement: "6a3a43656ad3c657d3f8cc33",
      }

      addMessage("Postroll is shown after the content.");
    }
    if (enablePauseAd) {
      if (mediatype === 'video') {
        ScreenovaConfig.pauseroll = {
          placement: "6a3a43656ad3c657d3f8cc33",
          // format: "slider",
          // videoFit: "cover",
          // borderRadius: '8px'
          allowWidth: '100%',
          allowHeight: '100%',
          width: '100%',
          height: '100%',
          skipMessage: 'Reprendre',
          skipMiniature: true,
        }

        addMessage("Pauseroll is showing a video ad on pause.");
      } if (mediatype === 'videonative') {
        ScreenovaConfig.pauseroll = {
          placement: "6a3a43656ad3c657d3f8cc33",
          width: 400,
          height: 300,
          format: "slider",
          widget: "side-by-side",
          videoFit: "cover",
          borderRadius: '8px',
          hideOnStop: true,
          templatePosition: 'bottom',
          templateMargin: 0,
          skipButton: false,
          closeButton: true,
          videoLoop: true,
        }

        addMessage("Pauseroll is showing a video & Native ad on pause.");
      }
      else if (mediatype === 'native') {
        ScreenovaConfig.pauseroll = {
          placement: "6a3a43656ad3c657d3f8cc33",
          format: "slider",
          mediatype: "native",
          width: 300,
          height: 68,
          vmargin: 100,
          borderRadius: '8px',
          template: nativeTemplateNativeOnly
        }

        addMessage("Pauseroll is showing a Native ad on pause.");
      }
      else if (mediatype === 'carousel') {
        ScreenovaConfig.pauseroll = {
          multiAd: 'slider-carousel',
          itemWidth: 333,
          itemHeight: 68,
          mediatype: 'native',
          autoroll: false,
          template: nativeTemplateCarousel,
          ads: [{
            placement: "6a3a43656ad3c657d3f8cc33"
          },
          {
            placement: "6a3a43656ad3c657d3f8cc33"
          }]
        }

        addMessage("Pauseroll is showing some native ads in a carousel on pause.");
      }
      else if (mediatype === 'banner') {
        ScreenovaConfig.pauseroll = {
          partnerId: '349693',
          ADM: bannerADM,
          width: 300,
          height: 250,
          format: "slider",
          borderRadius: '8px',
          mediatype: 'banner',
        }

        addMessage("Pauseroll is showing a banner ad on pause.");
      }
    }

    if (enableNonLinearAd) {
      if (mediatype === 'video') {
        ScreenovaConfig.nonlinear = [
          {
            startTime: "-00:00:30",
            maxDuration: 20000,
            placement: "6a3a43656ad3c657d3f8cc33",
            width: '100%',
            height: '100%',
            allowWidth: '100%',
            allowHeight: '100%',
            skipMiniature: true,
          }
        ]

        addMessage("Nonlinear slot is showing a video ad 30sec before the content ends.");

      } if (mediatype === 'videonative') {
        ScreenovaConfig.nonlinear = {
          startTime: "-00:00:30",
          placement: "6a3a43656ad3c657d3f8cc33",
          width: 400,
          height: 300,
          format: "slider",
          widget: "side-by-side",
          videoFit: "cover",
          borderRadius: '8px',
        }

        addMessage("Nonlinear slot is showing a video & native ad 30sec before the content ends.");
      } else if (mediatype === 'native') {
        ScreenovaConfig.nonlinear = {
          startTime: "00:00:03",
          placement: "6a3a43656ad3c657d3f8cc33",
          format: "slider",
          mediatype: "native",
          width: 350,
          height: 70,
          borderRadius: '8px',
          template: nativeTemplateCarousel
        }

        addMessage("Nonlinear slot is showing a native ad at 3sec.");
      } else if (mediatype === 'carousel') {
        ScreenovaConfig.nonlinear = {
          mediatype: 'native',
          startTime: "00:00:03",
          maxDuration: 30000,
          multiAd: 'slider-carousel',
          shownItems: 2,
          itemWidth: 320,
          itemHeight: 100,
          autoroll: 8000,
          template: nativeTemplateCarousel,
          ads: [{
            placement: "6a3a43656ad3c657d3f8cc33"
          },
          {
            placement: "6a3a43656ad3c657d3f8cc33"
          }]
        }
        addMessage("Nonlinear slot is showing some native ads in a carousel at 3sec.");
      }
      else if (mediatype === 'banner') {
        ScreenovaConfig.nonlinear = {
          mediatype: 'banner',
          startTime: "00:00:03",
          partnerId: '349693',
          ADM: bannerADM,
          width: 300,
          height: 250,
          format: "slider",
          borderRadius: '8px',
        }

        addMessage("Nonlinear slot is showing a banner ad at 3sec.");
      }
    }

    const pluginConf = {};
    pluginConf["https://static.screenova.cloud/snplayer.js"] = ScreenovaConfig;

    // Setup the player
    const player = jwplayer('player').setup({
      width: 780,
      height: 439,
      file: '../../resources/umbrella.mp4',
      plugins: pluginConf
    });

    window.setTimeout(() => {
      const versionText = window.Screenova?.version || "Loading error.";
      document.getElementById("version").innerText = versionText;
    }, 1000);
  </script>
</body>

</html>
