<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenova sample player</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #5a95a2;
    }

    #header {
      text-align: center;
      padding: 20px;
    }

    #logo {
      max-width: 275px;
    }

    #videoContainer {
      width: 100%;
      height: 350px;
      padding: 25px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background-color: #f9e1d7;
    }

    #target {
      position: relative;
      margin: auto;
      top: 25px;
      width: 769px;
      height: 300px;
    }
  </style>
  <script type="text/javascript" src="https://static.screenova.cloud/snplayer.js"></script>
  <link rel="stylesheet" href="../screenova-theme.css">
  <script defer src="../screenova-theme.js"></script>
</head>

<body>

  <div id="header">
    <img id="logo"
      src="https://screenova.cloud/logo.png"
      alt="Logo">
    <h1>Oustream video/native side by side </h1>
  </div>

  <div id="videoContainer">
    <div id="target"></div>
  </div>

  <script>
    const ScreenovaConfig = {
      placement: '6a3a43656ad3c657d3f8cc33',
      width: 769,
      height: 300,
      videoLoop: true,
      positionSelector: "#target",
      widget: "side-by-side",
      template: '<div style="border: solid 3px #004195;width:100%;height:100%;background:#fff;overflow:hidden;display:flex;flex-direction:column;align-items:flex-start;padding:10px;box-sizing:border-box;font-family:sans-serif;"><img class="sn-el-img" style="width:200px;height:160px;object-fit:contain;margin-bottom:10px;"><div class="sn-el-title" style="max-height: 50px;font-size:14px;font-weight:bold;color:#004196;text-align:left;margin: 0 0 5px 20px;"></div><div class="sn-el-description" style="font-size:14px;text-align:left;margin: 0 20px 10px 20px;"></div><div class="sn-el-price" style="color:#004196;font-size:23px;font-weight:600;text-align:left;margin: 0 20px 10px 20px;flex-grow:1;"></div></div>'
    }

    window.Screenova.init(ScreenovaConfig, function (creative) {
      creative.subscribe(function () {
        console.log("SNPlayer: AdLoaded!");
      }, window.Screenova.VPAID_EVENTS.AdLoaded);
      creative.subscribe(function () {
        console.log("SNPlayer: AdStopped!");
      }, window.Screenova.VPAID_EVENTS.AdStopped);
      creative.subscribe(function () {
        console.log("SNPlayer: Skip button clicked!");
      }, window.Screenova.VPAID_EVENTS.AdSkipped);
    });
  </script>

</body>

</html>
