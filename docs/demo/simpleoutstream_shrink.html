<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenova sample player</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #5a95a2;
    }

    #header {
      text-align: center;
      padding: 20px;
    }

    #logo {
      max-width: 275px;
    }


    #videoContainer {
      width: 1067px;
      height: 600px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background-color: khaki;
    }

    #target {
      position: absolute;
      top: 0px;
      left: 0px;
      width: 100%;
      height: 100%;
    }
  </style>
  <script type="text/javascript" src="https://static.screenova.cloud/snplayer.js"></script>
  <link rel="stylesheet" href="../screenova-theme.css">
  <script defer src="../screenova-theme.js"></script>
</head>

<body>

  <div id="header">
    <img id="logo"
      src="https://screenova.cloud/logo.png"
      alt="Logo">
    <h1>Oustream scale down example</h1>
  </div>

  <div id="videoContainer">
    <div id="target"></div>
  </div>

  <script>

    function scaleDownPlayer() {
      const videoContainer = document.getElementById('target');
      videoContainer.style.transition = 'left 2s, top 2s, width 2s, height 2s';
      videoContainer.style.left = "20px";
      videoContainer.style.top= "400px";
      videoContainer.style.width="213px";
      videoContainer.style.height="120px";
    }

    const ScreenovaConfig = {
      placement: '6a3a43656ad3c657d3f8cc33',
      width: '100%',
      height: '100%',
      positionSelector: "#target",
      soundButton:false,
      context:{
        content_type:'value1',
      }
    }

    window.Screenova.init(ScreenovaConfig, function (creative) {
      creative.subscribe(function () {
        console.log("SNPlayer: AdLoaded!");
      }, window.Screenova.VPAID_EVENTS.AdLoaded);
      creative.subscribe(function () {
        console.log("SNPlayer: AdStopped!");
      }, window.Screenova.VPAID_EVENTS.AdStopped);
      creative.subscribe(function () {
        console.log("SNPlayer: Skip button clicked!");
      }, window.Screenova.VPAID_EVENTS.AdSkipped);

      creative.subscribe(function () {
        console.log("SNPlayer: Skip button clicked!");
        window.setTimeout(()=>{
          scaleDownPlayer();
        }, 3000); // wait 3 sec: the needed delay for the 'ViewableImpression' event
      }, window.Screenova.VPAID_EVENTS.AdImpression);
    });
  </script>

</body>

</html>
