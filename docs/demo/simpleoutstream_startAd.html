<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenova sample player</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #5a95a2;
    }

    #header {
      text-align: center;
      padding: 20px;
    }

    #logo {
      max-width: 275px;
    }


    #videoContainer {
      width: 500px;
      height: 280px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    #target {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
  <script type="text/javascript" src="https://static-preprod.screenova.cloud/snplayer.js"></script>
  <link rel="stylesheet" href="../screenova-theme.css">
  <script defer src="../screenova-theme.js"></script>
</head>

<body>

  <div id="header">
    <img id="logo"
      src="https://screenova.cloud/logo.png"
      alt="Logo">
    <h1>Oustream simple example</h1>
  </div>
  <div id="controls" style="text-align:center; margin-top: 12px;">
    <button id="startAdButton" type="button" disabled>Start Ad</button>
  </div>
  <div id="videoContainer">
    <div id="target"></div>
  </div>


  <script>
    const ScreenovaConfig = {
      placement: '6a313c955244dec81823bde9',
      width: '100%',
      height: '100%',
      positionSelector: "#target",
      autoplay:false
    }

    window.Screenova.init(ScreenovaConfig, function (creative) {
      const startAdButton = document.getElementById('startAdButton');
      let startAdRequested = false;
      startAdButton.addEventListener('click', function () {
        if (startAdRequested) return;
        startAdRequested = true;
        creative.startAd();
      });

      creative.subscribe(function () {
        console.log("SNPlayer: AdLoaded!");
        startAdButton.disabled = false;
      }, window.Screenova.VPAID_EVENTS.AdLoaded);
      creative.subscribe(function () {
        console.log("SNPlayer: AdStarted!");
      }, window.Screenova.VPAID_EVENTS.AdStarted);
      creative.subscribe(function () {
        console.log("SNPlayer: AdPlaying!");
      }, window.Screenova.VPAID_EVENTS.AdPlaying);
      creative.subscribe(function () {
        console.log("SNPlayer: AdStopped!");
      }, window.Screenova.VPAID_EVENTS.AdStopped);
      creative.subscribe(function () {
        console.log("SNPlayer: Skip button clicked!");
      }, window.Screenova.VPAID_EVENTS.AdSkipped);
      creative.subscribe(function () {
        console.log("SNPlayer: AdVideoFirstQuartile!");
      }, window.Screenova.VPAID_EVENTS.AdVideoFirstQuartile);
      creative.subscribe(function () {
        console.log("SNPlayer: AdVideoMidpoint!");
      }, window.Screenova.VPAID_EVENTS.AdVideoMidpoint);
      creative.subscribe(function () {
        console.log("SNPlayer: AdVideoThirdQuartile!");
      }, window.Screenova.VPAID_EVENTS.AdVideoThirdQuartile);
      creative.subscribe(function () {
        console.log("SNPlayer: AdVideoComplete!");
      }, window.Screenova.VPAID_EVENTS.AdVideoComplete);
    });
  </script>
</body>

</html>
