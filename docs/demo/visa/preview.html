<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="width=device-width" />
	<title>Screenova Monna PREVIEW</title>
	<style>
		body {
			margin: 0px;
			padding: 0px;
			font-family: Arial, sans-serif;
			background-color: #5a95a2;
		}

	</style>
  <link rel="stylesheet" href="../../screenova-theme.css">
  <script defer src="../../screenova-theme.js"></script>
</head>

<body>

	<div class="container">

	</div>




	<script type="text/javascript">


    nativeData = {
      "title": "Visa Infinite",
      "brand": "Visa",
      "description": "De nouvelles expériences : Privilèges et Club Visa Infinite, Concierge 24h/24...",
      "ctatext": "Découvrez my Visa",
      "imageUrl": "../../images/visa.png",
      "clickUrl": "https://my.visa.fr/fr",
      "brandLogoUrl": "https://my.visa.fr/themes/custom/visa_ch_france/logo.svg",
      "brandColor": "#021e4c",
    };


		var s = document.createElement("script");
		s.src = "https://static.screenova.cloud/snplayer.js";
		s.onload = function () {
			const SN = window.Screenova;

			const ScreenovaConfig = {
				placement: "6a3a43656ad3c657d3f8cc33",
				partnerId: '644250',
        mediatype: "native",
        nativeData,
        widget:'monna',
				width: 200,
				height: 340,
				format: 'slider',
				align: 'right',
				hideButtons: 3000,
				autoroll: 6000,
				collapseButton: true,
				vmargin: 100, // default is 30
				// native template can be customized here
				//template: '<div style="width:100%;height:100%;"><img src="" style="width:100%;height:100%;" class="sn-el-img"/></div>',
				mobile: {
					width: 360,
					height: 290,
				}
			}

			SN.init(ScreenovaConfig, (ad) => {
				if (ad && ad.subscribe) {
					ad.subscribe(() => SN.tools.track("http://fakepxl.screenova.cloud"), SN.VPAID_EVENTS.AdClickThru);
					ad.subscribe(() => SN.tools.GAMNoAdCallback('Footer-web'), SN.VPAID_EVENTS.AdError);
				}
			});
		}
		document.body.appendChild(s);
	</script>
</body>

</html>
