<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kay Value sample</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #5a95a2;
    }

    #header {
      text-align: center;
      padding: 20px;
    }

    #logo {
      max-width: 275px;
    }


    .videoContainer {
      width: 800px;
      margin: 0 auto;
      overflow: hidden;
    }

    #target {
      width: 500px;
      height: 280px;
      margin: auto;
    }
    #target2 {
      width: 800px;
      height: 200px;
    }
  </style>
  <script type="text/javascript" src="https://static-preprod.screenova.cloud/snplayer.js"></script>
  <link rel="stylesheet" href="../screenova-theme.css">
  <script defer src="../screenova-theme.js"></script>
</head>

<body>

  <div id="header" style="display: flex; flex-direction: row; align-items: center;justify-content:center;">
    <img id="logo"
      src="https://screenova.cloud/logo.png"
      alt="Logo">
    <h1>Oustream with KeyValue targeting example</h1>
  </div>

  <div style=" display: flex; flex-direction:column;justify-content:  center; align-items: flex-start; max-width:1024px; margin: auto;">
    <div class="videoContainer">
      <p><b>key value:   "crea" = "samsung"</b></p>
      <div id="target"></div>
    </div>
    <div class="videoContainer">
      <p><b>key value:   "crea" = "iphone"</b></p>
      <div id="target2"></div>
    </div>
  </div>


  <script>

    window.Screenova.init({
      placement: '6a313c955244dec81823bde9',
      width: '100%',
      height: '100%',
      positionSelector: "#target",
      allowRefresh: true,
      videoLoop: true,
      context:{
        crea:'samsung',
      }
    });


    window.Screenova.init({
      placement: '6a313c955244dec81823bde9',
      width: '100%',
      height: '100%',
      positionSelector: "#target2",
      allowRefresh: true,
      videoLoop: true,
      widget:'monna',
      context:{
        crea:'iphone',
      }
    });
  </script>

</body>

</html>
