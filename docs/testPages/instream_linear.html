<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetailSport Instream : Linear slots</title>
  <style>
    body {
      color: #c6fff4;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #212122;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    h1 {
      width: 80%;
    }

    #video-container {
      position: relative;
      text-align: center;
      width: 950px;
      height: 534px;
    }

    #video-target {
      width: 100%;
      height: 100%;
      display: block;
    }

    .settings {
      padding: 10px;
      margin-bottom: 40px;
      width: 80%;
    }

    .settings-section {
      padding: 10px;
      width: 80%;
    }

    .button {
      height: 50px;
      color: gray;
      background-color: #8ea2af;
      border: 1px solid gray;
      display: inline-block;
      padding: 0px 16px;
      margin: 5px;
      cursor: pointer;
      font-size: large;
      font-weight: bold;
      text-align: center;
      line-height: 50px;
    }

    .fullscreen-button {
      width: 30px;
      height: 35px;
      position: absolute;
      bottom: 6%;
      right: 6%;
      cursor: pointer;
    }

    .button.selected {
      color: white;
      background-color: #5a95a2;
      border: 1px solid white;
    }

    #snp-version,
    p {
      color: white;
    }
  </style>
  <link rel="stylesheet" href="../screenova-theme.css">
  <script defer src="../screenova-theme.js"></script>
</head>

<body>
  <h1 id="title">Screenova Instream: Linear ad slots</h1>
  <div class="settings">
    <div class="settings-section">
      <b>SNPlayer version: <span id="snp-version"></span></b>
    </div>
    <p>The following player shows some ads in <b>prerol</b>, <b>midroll</b> (at : 10 seconds and 20 seconds),
      <b>postroll</b> and a <b>non-linear ad slot</b> during ending at 7&nbsp;minutes 22&nbsp;seconds.
    </p>
  </div>

  <div id="video-container">
    <video controls id="video-target" muted>
      <source src="../resources/umbrella.mp4" type="video/mp4">
      Votre navigateur ne prend pas en charge la lecture vidéo.
    </video>
    <div class="fullscreen-button" onclick="toggleFullscreen()"></div>
  </div>

  <script type="text/javascript">

    function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.getElementById("video-container").requestFullscreen();
      }
    }

    function findGetParameter(parameterName) {
      var result = null,
        tmp = [];
      location.search
        .substr(1)
        .split("&")
        .forEach(function (item) {
          tmp = item.split("=");
          if (tmp[0].toLowerCase() === parameterName.toLowerCase()) result = decodeURIComponent(tmp[1]);
        });
      return result;
    }

    var env = findGetParameter("env") || "";
    if (env) {
      env = "-" + env;
    }
    scriptSrc = "https://static" + env + ".screenova.cloud/snplayer.js";
    var placement = scriptSrc.indexOf("-preprod") !== -1 ? "6a313c955244dec81823bde9" : "6a3a43656ad3c657d3f8cc33";


    var s = document.createElement("script");
    s.src = scriptSrc;
    s.onload = function () {

      document.getElementById("snp-version").innerText = window.Screenova.version;


      const ScreenovaConfig = {
        videoElement: document.getElementById("video-target"),
        positionSelector: "#video-container",
        preroll: {
          placement: placement,
        },
        midroll: [{
          startTime: "00:00:10",
          placement: placement,
          skipMiniature: true,
        },
        {
          startTime: "00:00:20",
          placement: placement,
        }],
        postroll: {
          placement: placement,
        },
        nonlinear: {
          placement: placement,
          // non linear during ending
          startTime: "00:07:22",
          // allow to cover all player
          allowWidth: "100%",
          allowHeight: "100%",
          width: "100%",
          height: "100%",
          // show player miniature
          skipMiniature: true,
        }
      }


      window.Screenova.init(ScreenovaConfig, function (creative) {
        creative.subscribe(function () {
          console.log("SNPlayer: AdLoaded!");
        }, window.Screenova.VPAID_EVENTS.AdLoaded);

        creative.subscribe(function () {
          console.log("SNPlayer: AdVideoStart!");
        }, window.Screenova.VPAID_EVENTS.AdVideoStart);

        creative.subscribe(function () {
          console.log("SNPlayer: AdVideoFirstQuartile!");
        }, window.Screenova.VPAID_EVENTS.AdVideoFirstQuartile);

        creative.subscribe(function () {
          console.log("SNPlayer: AdVideoMidpoint!");
        }, window.Screenova.VPAID_EVENTS.AdVideoMidpoint);

        creative.subscribe(function () {
          console.log("SNPlayer: AdVideoThirdQuartile!");
        }, window.Screenova.VPAID_EVENTS.AdVideoThirdQuartile);

        creative.subscribe(function () {
          console.log("SNPlayer: AdVideoComplete!");
        }, window.Screenova.VPAID_EVENTS.AdVideoComplete);
      });
    }
    document.body.appendChild(s);
  </script>
</body>

</html>
