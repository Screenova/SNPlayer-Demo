<!DOCTYPE html>
<html>

<head>
    <link rel="icon" sizes="192x192"
        href="https://screenova.cloud/logo.png"
        type="image/png">
    <script src='../demo/jwplayer/lib/jw-8.24.3/jwplayer.js'></script>

    <style type="text/css">
        body {
            font-family: arial;
        }

        .setting {
            margin: 20px;
            display: none;
        }
    </style>
  <link rel="stylesheet" href="../screenova-theme.css">
  <script defer src="../screenova-theme.js"></script>
</head>

<body>
    <div>
        <div class="setting">
            <b>Env:</b>
            <select id="env-select">
                <option value="prod">Prod</option>
                <option value="preprod">Preprod</option>
            </select>
        </div>
        <div class="setting">
            <b>Placement:</b>
            <input style="width:300px" type="text" id="placement-select" value="" />
        </div>
        <div class="setting">
            <button onclick="changeTest()">APPLY</button>
        </div>
    </div>
    <div>
        <h2>placement: <span id="placement-display">6a3a43656ad3c657d3f8cc33</span></h2>
        <h3>env: <span id="env-display">prod</span></h3>
    </div>
    <div id="player">Loading the player...</div>
    <script>
        function findGetParameter(parameterName) {
            var result = null,
                tmp = [];
            location.search
                .substr(1)
                .split("&")
                .forEach(function (item) {
                    tmp = item.split("=");
                    if (tmp[0].toLowerCase() === parameterName.toLowerCase()) result = decodeURIComponent(tmp[1]);
                });
            return result;
        }

        function changeTest() {
            var currentUrl = document.location.href;
            var indexOfQueryStr = currentUrl.lastIndexOf('?');
            if (indexOfQueryStr !== -1) {
                currentUrl = currentUrl.substr(0, indexOfQueryStr);
            }

            var env = document.getElementById("env-select").value;
            var placement = document.getElementById("placement-select").value;

            document.location.href = currentUrl + "?env=" + env + "&placement=" + placement
        }

        var env = findGetParameter("env") || "prod";
        document.getElementById("env-select").value = env;
        document.getElementById("env-display").innerText = env;

        var testPlacements = {
            prod: "6a3a43656ad3c657d3f8cc33",
            preprod: "6a313c955244dec81823bde9"
        };
        var placement = findGetParameter("placement") || testPlacements[env] || testPlacements.prod;
        document.getElementById("placement-select").value = placement;
        document.getElementById("placement-display").innerText = placement;

        var endpoint = "https://static.screenova.cloud/snplayer.js";
        if (findGetParameter("env") === "preprod") {
            endpoint = "https://static-preprod.screenova.cloud/snplayer.js";
        }

        const plugins = [];
        plugins[endpoint] = {
            "pauseroll": {
                placement: placement,
                format: "slider",
                skipMessage: "Fermer",
                width: 320,
                height: 240,
                rerunDelay: 5000,
                muted: true,
                fullscreen: {
                    width: 400,
                    height: 300,
                    vmargin: 150,
                    hmargin: 150,
                },
                mobile: {
                    width: 220,
                }
            }
        }
        // Setup the player
        const player = jwplayer('player').setup({
            width: 780,
            height: 438,
            file: '../resources/umbrella.mp4',
            plugins: plugins
        });

        window.SNShowSetting = () => {
            Array.from(document.getElementsByClassName("setting")).forEach(el => {
                el.style.display = "block";
            });
        }
    </script>
</body>

</html>
